name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *" 
  workflow_dispatch:

# Permissão explícita de escrita para corrigir o erro 128
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Atualizado para v4 para corrigir o aviso do Node.js
      - uses: actions/checkout@v4

      - uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: FlaviaMarcella
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      # Atualizado para v4 para corrigir o aviso do Node.js
      - name: Push to GitHub
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
